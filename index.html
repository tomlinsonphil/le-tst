<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomlinson Special Treatment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1C2541;
    --ink-soft: #2E3A5C;
    --brass: #B8862B;
    --paper: #E8EBE3;
    --card: #FAF8F3;
    --line: #C7CBBE;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }

  a { color: inherit; }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  header {
    padding: 64px 0 40px;
    text-align: center;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    margin: 0;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  header .rule {
    width: 48px;
    height: 2px;
    background: var(--brass);
    margin: 22px auto 0;
  }

  .links {
    padding: 20px 0 60px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px 22px;
    text-decoration: none;
    display: block;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .card:hover, .card:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(28, 37, 65, 0.1);
  }

  .card h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .card p {
    margin: 0;
    font-size: 0.88rem;
    color: var(--ink-soft);
  }

  footer {
    text-align: center;
    padding: 28px 0 50px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-soft);
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

  <header>
    <h1>Tomlinson Special Treatment</h1>
    <div class="rule"></div>
  </header>

  <main class="wrap">
    <section class="links">
      <p class="section-label">Links</p>
      <div class="grid">

        <a class="card" href="#">
          <h3>Health</h3>
          <p>Guy — appointments &amp; notes</p>
        </a>

      </div>
    </section>
  </main>

  <footer>
    le-tst.com
  </footer>

</body>
</html>
